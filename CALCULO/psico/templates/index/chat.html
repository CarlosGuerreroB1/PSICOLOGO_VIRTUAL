<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empathy AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #dce8f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 900px;
      background-color: #e8f1fb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(100, 130, 200, 0.18);
    }

    /* HEADER */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background-color: #ffffff;
      border-bottom: 1px solid #d5e3f5;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c6fe0 0%, #a78bfa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(124, 111, 224, 0.35);
    }

    .avatar svg {
      width: 26px;
      height: 26px;
    }

    .header-info h1 {
      font-size: 1.15rem;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.2;
    }

    .header-info p {
      font-size: 0.8rem;
      color: #8a9cc0;
      font-weight: 600;
      margin-top: 2px;
    }

    /* MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #b8cce8;
      border-radius: 4px;
    }

    .message-group {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bot-group  { align-self: flex-start; align-items: flex-start; }
    .user-group { align-self: flex-end;   align-items: flex-end; }

    .message {
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 0.97rem;
      font-weight: 600;
      line-height: 1.55;
      word-break: break-word;
    }

    .bot-message {
      background: linear-gradient(135deg, #7c6fe0 0%, #9b89f5 100%);
      color: #ffffff;
      border-bottom-left-radius: 6px;
      box-shadow: 0 4px 16px rgba(124, 111, 224, 0.28);
    }

    .user-message {
      background: #ffffff;
      color: #2d3561;
      border-bottom-right-radius: 6px;
      box-shadow: 0 2px 10px rgba(100, 130, 200, 0.14);
    }

    .message-time {
      font-size: 0.72rem;
      color: #9baec8;
      font-weight: 600;
      margin-top: 5px;
      padding: 0 4px;
    }

    /* TYPING */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 20px;
    }

    .typing-indicator span {
      display: block;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.75);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.75); opacity: 0.5; }
      40%            { transform: scale(1.15); opacity: 1; }
    }

    /* INPUT */
    .chat-input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 20px;
      background-color: #e8f1fb;
    }

    .chat-input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #c8dcf5;
      border-radius: 30px;
      background: #ffffff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.93rem;
      font-weight: 600;
      color: #2d3561;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .chat-input::placeholder { color: #a0b4cc; font-weight: 600; }

    .chat-input:focus {
      border-color: #9b89f5;
      box-shadow: 0 0 0 4px rgba(155, 137, 245, 0.15);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #7c6fe0 0%, #a78bfa 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(124, 111, 224, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(124, 111, 224, 0.5);
    }

    .send-btn:active { transform: scale(0.96); }

    .send-btn svg {
      width: 20px;
      height: 20px;
      margin-left: 2px;
    }

    @media (max-width: 520px) {
      .chat-wrapper { max-height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

  <div class="chat-wrapper">

    <!-- HEADER -->
    <div class="chat-header">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L9.09 8.26L2 9.27L7 14.14L5.82 21.02L12 17.77L18.18 21.02L17 14.14L22 9.27L14.91 8.26L12 2Z"
            fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-info">
        <h1>Empathy AI</h1>
        <p>Aquí para escuchar y apoyar</p>
      </div>
    </div>

    <!-- MENSAJES -->
    <div class="chat-messages" id="chatMessages">

      <div class="message-group bot-group">
        <div class="message bot-message">
          ¡Hola! Soy Empathy AI, tu compañero compasivo. Estoy aquí para escucharte sin juzgar y apoyarte. ¿Cómo te sientes hoy?
        </div>
        <span class="message-time">11:02 p. m.</span>
      </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input-area">
      <input
        type="text"
        id="userInput"
        class="chat-input"
        placeholder="Comparte cómo te sientes..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>

  <script>
    const input = document.getElementById('userInput');
    const messages = document.getElementById('chatMessages');

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function getTime() {
      return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      // Mensaje del usuario
      const userGroup = document.createElement('div');
      userGroup.classList.add('message-group', 'user-group');
      userGroup.innerHTML = `
        <div class="message user-message">${text}</div>
        <span class="message-time">${getTime()}</span>
      `;
      messages.appendChild(userGroup);
      input.value = '';
      scrollToBottom();

      // Indicador de escritura
      const typing = document.createElement('div');
      typing.classList.add('message-group', 'bot-group');
      typing.innerHTML = `
        <div class="message bot-message typing-indicator">
          <span></span><span></span><span></span>
        </div>
      `;
      messages.appendChild(typing);
      scrollToBottom();

      // Respuesta del bot (reemplazar con fetch a tu vista Django)
      setTimeout(() => {
        typing.remove();
        const botGroup = document.createElement('div');
        botGroup.classList.add('message-group', 'bot-group');
        botGroup.innerHTML = `
          <div class="message bot-message">Gracias por compartir eso conmigo. Estoy aquí para escucharte. ¿Quieres contarme más?</div>
          <span class="message-time">${getTime()}</span>
        `;
        messages.appendChild(botGroup);
        scrollToBottom();
      }, 1500);
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }
  </script>

</body>
</html>
